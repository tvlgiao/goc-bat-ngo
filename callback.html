<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization — Góc Bất Ngờ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .container { max-width: 600px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        .code-box { background: #222; border: 2px solid #ff4d4d; border-radius: 8px; padding: 1rem; margin: 1rem 0; word-break: break-all; font-family: monospace; font-size: 1.1rem; cursor: pointer; }
        .code-box:hover { background: #333; }
        .hint { color: #aaa; font-size: 0.9rem; margin-top: 1rem; }
        .error { color: #ff4d4d; }
        .success { color: #4dff4d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Góc Bất Ngờ</h1>
        <div id="result"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const resultDiv = document.getElementById('result');

        if (code) {
            resultDiv.innerHTML = `
                <p class="success">Authorization successful!</p>
                <p>Copy this code and paste it in the terminal:</p>
                <div class="code-box" onclick="navigator.clipboard.writeText('${code}').then(()=>this.style.borderColor='#4dff4d')" title="Click to copy">${code}</div>
                <p class="hint">Click the code to copy it to clipboard.</p>
            `;
        } else if (error) {
            const desc = params.get('error_description') || '';
            resultDiv.innerHTML = `
                <p class="error">Authorization failed: ${error}</p>
                <p>${desc}</p>
            `;
        } else {
            resultDiv.innerHTML = '<p class="error">No authorization code received.</p>';
        }
    </script>
</body>
</html>
